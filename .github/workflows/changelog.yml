name: Update changelog

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  changelog-check:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG.md was updated
        run: |
          set -euo pipefail
          if git diff --name-only "origin/${{ github.base_ref }}...HEAD" | grep -Fxq "CHANGELOG.md"; then
            echo "CHANGELOG.md changed in this PR."
          else
            echo "::error::CHANGELOG.md was not updated in this PR. Please add a changelog entry."
            exit 1
          fi
